<style>
    @font-face {
        font-family: "Bahnschrift";
        src: local("Bahnschrift SemiBold SemiConden"),
             local("Bahnschrift");
        font-weight: 600;
    }

    .card {
        background: #FFFFFF;
        border: 2px solid #111111; /* stronger, squared border */
        padding: 24px;
        border-radius: 0; /* squared off */
        transition: background 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
        background: #F7F7F7;
        border-color: #000000;
    }

    .card a {
        font-family: "Bahnschrift", sans-serif;
        font-weight: 600;
        text-decoration: none;
        color: #111111;
        letter-spacing: 0.5px;
        font-size: 17px;
        display: block;
        text-transform: uppercase;
    }
</style>
