<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your List</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 60px;
            background: #F2F2F2; /* matches your logo background */
            color: #111111;
            line-height: 1.6;
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 18px;
            color: #555555;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 22px;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #FFFFFF;
            border: 1px solid #DDDDDD;
            padding: 20px;
            border-radius: 8px;
            transition: border-color 0.2s ease;
        }

        .card:hover {
            border-color: #111111;
        }

        .card a {
            text-decoration: none;
            color: #111111;
            font-weight: 500;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            color: #777777;
        }
    </style>
</head>
<body>

    <h1>[Check Your List]</h1>
    <div class="tagline">Check your list. And done.</div>

    <h2>PDF Checklists</h2>

    <div class="grid">
        <div class="card"><a href="pdfs/tax-documents-checklist.pdf">Tax Documents Checklist</a></div>
        <div class="card"><a href="pdfs/citizenship-application-checklist.pdf">Citizenship Application Checklist</a></div>
        <div class="card"><a href="pdfs/passport-application-checklist.pdf">Passport Application Checklist</a></div>
        <div class="card"><a href="pdfs/pr-application-checklist.pdf">PR Application Checklist</a></div>
        <div class="card"><a href="pdfs/self-employed-tax-checklist.pdf">Self-Employed Tax Checklist</a></div>
        <div class="card"><a href="pdfs/nexus-application-checklist.pdf">NEXUS Application Checklist</a></div>
    </div>

    <footer>
        © CheckYourList
    </footer>

</body>
</html>
