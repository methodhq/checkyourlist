<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your List</title>

    <style>
        /* Brand Font for Cards */
        @font-face {
            font-family: "Bahnschrift";
            src: local("Bahnschrift SemiBold SemiConden"),
                 local("Bahnschrift");
            font-weight: 600;
        }

        /* Global Layout */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 60px;
            background: #F2F2F2; /* soft gray brand background */
            color: #111111;
            line-height: 1.6;
            text-align: center;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            width: 120px;
            height: auto;
        }

        /* Hero */
        .hero-title {
            font-size: 38px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .tagline {
            font-size: 18px;
            color: #555555;
            letter-spacing: 0.5px;
            margin-bottom: 50px;
        }

        /* Section Header */
        h2 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Card Style */
        .card {
            background: #FFFFFF;
            border: 2px solid #111111; /* squared, strong border */
            padding: 24px;
            border-radius: 0; /* squared off */
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            background: #F7F7F7;
            border-color: #000000;
        }

        .card a {
            font-family: "Bahnschrift", sans-serif;
            font-weight: 600;
            text-decoration: none;
            color: #111111;
            letter-spacing: 0.5px;
            font-size: 17px;
            display: block;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            margin-top: 60px;
            font-size: 14px;
            color: #777777;
        }
    </style>
</head>

<body>

    <!-- Logo -->
    <div class="logo-container">
        <img src="1.png" alt="Check Your List Logo" class="logo">
    </div>

    <!-- Hero -->
    <div class="hero-title">[ CHECK YOUR LIST ]</div>
    <div class="tagline">Check your list. And done.</div>

    <!-- Section Header -->
    <h2>[ PDF CHECKLISTS ]</h2>

    <!-- Checklist Grid -->
    <div class="grid">
        <div class="card"><a href="pdfs/tax-documents-checklist.pdf">[ TAX DOCUMENTS ]</a></div>
        <div class="card"><a href="pdfs/citizenship-application-checklist.pdf">[ CITIZENSHIP APPLICATION ]</a></div>
        <div class="card"><a href="pdfs/passport-application-checklist.pdf">[ PASSPORT APPLICATION ]</a></div>
        <div class="card"><a href="pdfs/pr-application-checklist.pdf">[ PR APPLICATION ]</a></div>
        <div class="card"><a href="pdfs/self-employed-tax-checklist.pdf">[ SELF‑EMPLOYED TAX ]</a></div>
        <div class="card"><a href="pdfs/nexus-application-checklist.pdf">[ NEXUS APPLICATION ]</a></div>
    </div>

    <!-- Footer -->
    <footer>
        © CheckYourList
    </footer>

</body>
</html>
